<?xml version="1.0" encoding="UTF-8"?>
<!-- Walccy / wildcard: an architectural PORTAL framing a terminal prompt. -->
<!-- The arch is a doorway from your phone into your machine (remote Claude Code sessions); -->
<!-- the chevron + block cursor inside is what waits on the other side: a live shell. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <rect width="1024" height="1024" fill="#0D0D0D"/>

  <!-- Tile + portal cutout as one even-odd path so the opening is true negative space.
       Outer: rounded rect 152,152..872,872, r=140.
       Inner: jambs from y=796 up to springline y=512, semicircular arch r=240, apex y=272. -->
  <path fill="#7B61FF" fill-rule="evenodd" d="
    M 292 152
    H 732
    A 140 140 0 0 1 872 292
    V 732
    A 140 140 0 0 1 732 872
    H 292
    A 140 140 0 0 1 152 732
    V 292
    A 140 140 0 0 1 292 152
    Z
    M 272 796
    V 512
    A 240 240 0 0 1 752 512
    V 796
    Z
  "/>

  <!-- Chevron prompt '>'. Stroked path, 64px wide, mitered, capped round. -->
  <path d="M 388 528 L 568 640 L 388 752"
        fill="none" stroke="#7B61FF" stroke-width="64"
        stroke-linecap="round" stroke-linejoin="miter" stroke-miterlimit="6"/>

  <!-- Block cursor: solid rounded rect, same vertical span as the chevron. -->
  <rect x="612" y="528" width="92" height="224" rx="16" ry="16" fill="#7B61FF"/>
</svg>
