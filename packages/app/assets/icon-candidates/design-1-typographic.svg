<?xml version="1.0" encoding="UTF-8"?>
<!--
  Walccy icon — typographic mark.
  A custom heavy monospace "W" with flat chiseled terminals, followed by
  a solid cursor block: the universal shorthand for an active CLI session.
  One letterform, one cursor — the whole identity in a single beat.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- background -->
  <rect width="1024" height="1024" fill="#0D0D0D"/>

  <!--
    Safe zone: 152..872 (720px square).
    W occupies x: 172..672 (width 500), y: 272..792 (height 520).
    Cursor block: 130x130 at x: 742..872, top-aligned with W (y=272).
    Gap between W and cursor: 70px (deliberate monospace-style spacing).

    W is four solid parallelogram strokes, horizontal stroke width 110px,
    yielding perpendicular weight ~85-100px depending on diagonal angle.

    Key x coordinates (all within safe zone):
      outer-left top:   172..282
      first valley:     262..372  (stroke 1 bottom + stroke 2 bottom)
      center peak:      352..462  (strokes 2 & 3 meet at y=472, flat top)
      second valley:    442..552
      outer-right top:  562..672

    Key y coordinates:
      top      = 272
      bottom   = 792
      peak     = 472
  -->
  <g fill="#7B61FF">
    <!-- Stroke 1: outer-left, descending -->
    <path d="M 172 272 L 282 272 L 372 792 L 262 792 Z"/>

    <!-- Stroke 2: inner-left, ascending to center peak -->
    <path d="M 262 792 L 372 792 L 462 472 L 352 472 Z"/>

    <!-- Stroke 3: inner-right, descending from center peak -->
    <path d="M 352 472 L 462 472 L 552 792 L 442 792 Z"/>

    <!-- Stroke 4: outer-right, ascending -->
    <path d="M 442 792 L 552 792 L 672 272 L 562 272 Z"/>

    <!-- Cursor block — the identity beat.
         A solid terminal cursor sitting beside the W at cap height,
         baseline-aligned (y=792) and reaching to y=472 (the W's
         center-peak line) so it visually rhymes with the letterform.
         Width 130 ≈ stroke weight; taller-than-wide like a real
         monospace block cursor. -->
    <rect x="742" y="472" width="130" height="320"/>
  </g>
</svg>
